name: Release

on:
  push:
    tags:
      - "v2.*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.12.x

      - name: Test
        run: go test -mod=vendor ./...

      - name: Vet
        run: go vet -mod=vendor ./...

  # Fast Linux-only gate for the gui/ module before a release build kicks
  # off. This intentionally does not build/test on Windows or macOS: the
  # full 3-OS GUI validation (see gui-validate.yml) already runs on every
  # push and pull request, so re-running it here would only add latency to
  # tag pushes. No loopback alias (127.0.0.2) is needed on Linux -- that
  # workaround is only required for the macOS and Windows legs of
  # gui-validate.yml.
  gui-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.24.x

      - name: Install Fyne build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Vet
        working-directory: gui
        run: go vet ./...

      - name: Test (race)
        working-directory: gui
        run: go test -race -count=1 ./...

  release:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.5

      - name: Build release assets
        shell: bash
        env:
          CGO_ENABLED: 0
        run: |
          set -euo pipefail

          rm -rf dist
          mkdir -p dist
          version="${GITHUB_REF_NAME#v}"

          for target in linux/amd64 linux/arm64 windows/amd64 windows/arm64 darwin/amd64 darwin/arm64; do
            goos="${target%/*}"
            goarch="${target#*/}"

            for app in gobac gobac-sim; do
              asset="${app}-${GITHUB_REF_NAME}-${goos}-${goarch}"
              stage="$(mktemp -d)"
              package="${stage}/${asset}"
              binary="${app}"

              if [[ "${goos}" == "windows" ]]; then
                binary="${binary}.exe"
              fi

              mkdir -p "${package}"
              GOOS="${goos}" GOARCH="${goarch}" go build \
                -mod=vendor \
                -trimpath \
                -ldflags="-s -w -X main.version=${version}" \
                -o "${package}/${binary}" \
                "./cmd/${app}"

              cp LICENSE README.md "${package}/"
              if [[ "${app}" == "gobac-sim" ]]; then
                mkdir -p "${package}/examples"
                cp examples/simulator.yaml "${package}/examples/"
              fi

              if [[ "${goos}" == "windows" ]]; then
                archive="${PWD}/dist/${asset}.zip"
                (cd "${stage}" && python3 -m zipfile -c "${archive}" "${asset}")
              else
                tar -C "${stage}" -czf "dist/${asset}.tar.gz" "${asset}"
              fi

              rm -rf "${stage}"
            done
          done

          (cd dist && sha256sum *.tar.gz *.zip > SHA256SUMS)

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* \
              --verify-tag \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi

  # gobac-gui (gui/) requires CGO for Fyne, so it cannot be cross-compiled
  # from ubuntu like the CLI targets above -- it needs to build on a native
  # runner per OS/arch. This job depends on "release" so the GitHub release
  # already exists (created by that job) before assets are uploaded to it;
  # each matrix leg uploads its own binary archive and its own
  # SHA256SUMS-gui-<goos>-<goarch> file with `--clobber`, so re-running a
  # single leg never clobbers another leg's assets.
  #
  # Runner label notes (verified against GitHub's hosted-runner docs as of
  # this workflow's authoring):
  #   - ubuntu-24.04-arm and windows-11-arm: Linux and Windows arm64
  #     standard runners are generally available for public repositories,
  #     so linux/arm64 and windows/arm64 are both included below.
  #   - macos-13 has been retired (fully unsupported since December 2025)
  #     and no longer exists as a runner label. Its replacement for
  #     Intel/x86_64 macOS is macos-15-intel, which is used below for
  #     darwin/amd64 instead of the originally-expected macos-13.
  #   - macos-latest currently resolves to an Apple Silicon (arm64) image,
  #     used below for darwin/arm64.
  #   No target was omitted: a currently-valid label exists for all six
  #   OS/arch combinations.
  # Note on ordering: the release is published (non-draft) by the "release"
  # job before this job's assets attach, so for a short window the release
  # page shows only the CLI assets, and a failed GUI leg leaves that
  # target's GUI asset missing until the leg is re-run. This
  # augment-after-publish design is intentional: it keeps the existing
  # release job as the sole creator and lets each GUI leg retry
  # independently without re-uploading everything.
  gui-release:
    needs: [release, gui-validate]
    defaults:
      run:
        # Every run step in this job must use bash: the default shell on
        # the Windows runners is PowerShell, where `set -euo pipefail`
        # and ${VAR} expansions in these scripts would fail.
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - runner: windows-latest
            goos: windows
            goarch: amd64
          - runner: windows-11-arm
            goos: windows
            goarch: arm64
          - runner: macos-15-intel
            goos: darwin
            goarch: amd64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.24.x

      - name: Install Fyne build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Build and package GUI release asset
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail

          # The Windows runner images expose only `python` on PATH, not
          # `python3` (actions/runner-images#2461), while the Linux and
          # macOS images have `python3`, so resolve whichever exists.
          PY="$(command -v python3 || command -v python)"

          asset="gobac-gui-${GITHUB_REF_NAME}-${GOOS}-${GOARCH}"
          stage="$(mktemp -d)"
          package="${stage}/${asset}"
          binary="gobac-gui"

          if [[ "${GOOS}" == "windows" ]]; then
            binary="${binary}.exe"
          fi

          mkdir -p "${package}"
          (cd gui && go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "${package}/${binary}" \
            .)

          cp LICENSE README.md "${package}/"

          mkdir -p dist
          if [[ "${GOOS}" == "windows" ]]; then
            archive="${PWD}/dist/${asset}.zip"
            (cd "${stage}" && "${PY}" -m zipfile -c "${archive}" "${asset}")
          else
            tar -C "${stage}" -czf "dist/${asset}.tar.gz" "${asset}"
          fi

          rm -rf "${stage}"

          # macOS runners ship without GNU coreutils' sha256sum, and
          # shasum's availability on the Windows runners' Git Bash isn't
          # guaranteed either, so compute the checksum with Python
          # (already required above for zip packaging, and present on
          # every GitHub-hosted runner family) for a result that's
          # portable across all three OSes.
          "${PY}" -c 'import hashlib, pathlib, sys; asset, goos, goarch = sys.argv[1:4]; dist = pathlib.Path("dist"); out = dist / f"SHA256SUMS-gui-{goos}-{goarch}"; out.write_text("\n".join(f"{hashlib.sha256(p.read_bytes()).hexdigest()}  {p.name}" for p in sorted(dist.glob(f"{asset}.*"))) + "\n")' "${asset}" "${GOOS}" "${GOARCH}"

      - name: Upload GUI release asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
