name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.12.x

      - name: Test
        run: go test -race -mod=vendor ./...

      - name: Vet
        run: go vet -mod=vendor ./...

      - name: Build CLIs
        run: go build -mod=vendor ./cmd/gobac ./cmd/gobac-sim

  cross-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: freebsd
            goarch: amd64
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.12.x

      - name: Build CLIs
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
        run: go build -mod=vendor ./cmd/gobac ./cmd/gobac-sim
