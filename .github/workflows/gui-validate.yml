name: GUI Validate

on:
  push:
    paths:
      - 'gui/**'
  pull_request:
    paths:
      - 'gui/**'

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.24.x

      - name: Install Fyne build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Vet
        working-directory: gui
        run: go vet ./...

      - name: Test
        working-directory: gui
        run: go test -race ./...

      - name: Build
        working-directory: gui
        run: go build ./...
