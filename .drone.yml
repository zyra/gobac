---
kind: pipeline
type: exec
name: build-docker

clone:
  depth: 1

steps:
  - name: build_docker_image
    commands:
      - docker build -t zyra/gobac -t harbor.zyra.ca/zyra/gobac .

  - name: push_docker_image
    depends_on:
      - build_docker_image
    when:
      branch:
        - master
    environment:
      DOCKER_USERNAME:
        from_secret: DOCKER_USERNAME
      DOCKER_TOKEN:
        from_secret: DOCKER_TOKEN
    commands:
      - docker login harbor.zyra.ca -u $DOCKER_USERNAME -p $DOCKER_TOKEN
      - docker push harbor.zyra.ca/zyra/gobac

---
kind: pipeline
type: exec
name: build-binaries-linux-amd64

clone:
  depth: 1

steps:
  - name: linux-amd64
    environment:
      GOOS: linux
      GOARCH: amd64
    commands:
      -  go build -mod vendor -o gobac-linux-amd64 cmd/gobac/main.go

---
kind: pipeline
type: exec
name: build-binaries-linux-arm64

clone:
  depth: 1

steps:
  - name: linux-arm64
    environment:
      GOOS: linux
      GOARCH: arm64
    commands:
      -  go build -mod vendor -o gobac-linux-arm64 cmd/gobac/main.go

---
kind: pipeline
type: exec
name: build-binaries-linux-arm

clone:
  depth: 1

steps:
  - name: linux-arm
    environment:
      GOOS: linux
      GOARCH: arm
    commands:
      - go build -mod vendor -o gobac-linux-arm cmd/gobac/main.go

---
kind: pipeline
type: exec
name: build-binaries-windows-amd64

clone:
  depth: 1

steps:
  - name: windows-amd64
    environment:
      GOOS: windows
      GOARCH: amd64
    commands:
      - go build -mod vendor -o gobac-windows-amd64 cmd/gobac/main.go

---
kind: pipeline
type: exec
name: build-binaries-darwin-amd64

clone:
  depth: 1

steps:
  - name: darwin-amd64
    environment:
      GOOS: darwin
      GOARCH: amd64
    commands:
      - go build -mod vendor -o gobac-darwin-amd64 cmd/gobac/main.go

---
kind: pipeline
type: exec
name: release
clone:
  disable: true
depends_on:
  - build-docker
  - build-binaries-linux-amd64
  - build-binaries-linux-arm64
  - build-binaries-linux-arm
  - build-binaries-windows-amd64
  - build-binaries-darwin-amd64
steps:
  - name: test
    commands:
      - ls -al

---
kind: pipeline
name: after
depends_on:
  - release
clone:
  disable: true
steps:
  - name: notify
    image: plugins/slack
    settings:
      webhook:
        from_secret: slack_webhook
      channel: test-zone
      username: drone
    when:
      status: [ success, failure ]