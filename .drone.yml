---
kind: pipeline
type: exec
name: build-docker

clone:
  depth: 1

steps:
  - name: build_docker_image
    commands:
      - docker build -t zyra/gobac -t harbor.zyra.ca/zyra/gobac .

  - name: push_docker_image
    depends_on:
      - build_docker_image
    when:
      branch:
        - master
    environment:
      DOCKER_USERNAME:
        from_secret: DOCKER_USERNAME
      DOCKER_TOKEN:
        from_secret: DOCKER_TOKEN
    commands:
      - docker login harbor.zyra.ca -u $DOCKER_USERNAME -p $DOCKER_TOKEN
      - docker push harbor.zyra.ca/zyra/gobac

---
kind: pipeline
type: docker
name: build-binaries

clone:
  depth: 1

volumes:
  - name: gobac_binary_build_cache
    host:
      path: /tmp/gobac_binary_build_cache
  - name: shared_cache
    temp: {}
  - name: bin
    temp: {}

steps:
  - name: restore-cache
    image: drillster/drone-volume-cache
    volumes:
      - name: shared_cache
        path: /cache-dir
      - name: gobac_binary_build_cache
        path: /cache
    settings:
      restore: true
      mount:
        - cache-dir

  - name: linux-amd64
    image: golang:1.12-alpine
    volumes:
      - name: shared_cache
        path: /root/.cache
      - name: bin
        path: /root/bin
    depends_on:
      - restore-cache
    environment:
      GOOS: linux
      GOARCH: amd64
    commands:
      -  go build -mod vendor -o /root/bin/gobac-linux-amd64 cmd/gobac/main.go

  - name: linux-arm64
    image: golang:1.12-alpine
    volumes:
      - name: shared_cache
        path: /root/.cache
      - name: bin
        path: /root/bin
    depends_on:
      - restore-cache
    environment:
      GOOS: linux
      GOARCH: arm64
    commands:
      -  go build -mod vendor -o /root/bin/gobac-linux-arm64 cmd/gobac/main.go

  - name: linux-arm
    image: golang:1.12-alpine
    depends_on:
      - restore-cache
    volumes:
      - name: shared_cache
        path: /root/.cache
      - name: bin
        path: /root/bin
    environment:
      GOOS: linux
      GOARCH: arm
    commands:
      - go build -mod vendor -o /root/bin/gobac-linux-arm cmd/gobac/main.go

  - name: linux-mips
    image: golang:1.12-alpine
    depends_on:
      - restore-cache
    volumes:
      - name: shared_cache
        path: /root/.cache
      - name: bin
        path: /root/bin
    environment:
      GOOS: linux
      GOARCH: mips
    commands:
      - go build -mod vendor -o /root/bin/gobac-linux-mips cmd/gobac/main.go

  - name: linux-mipsle
    image: golang:1.12-alpine
    depends_on:
      - restore-cache
    volumes:
      - name: shared_cache
        path: /root/.cache
      - name: bin
        path: /root/bin
    environment:
      GOOS: linux
      GOARCH: mipsle
    commands:
      - go build -mod vendor -o /root/bin/gobac-linux-mipsle cmd/gobac/main.go

  - name: linux-mips64
    image: golang:1.12-alpine
    depends_on:
      - restore-cache
    volumes:
      - name: shared_cache
        path: /root/.cache
      - name: bin
        path: /root/bin
    environment:
      GOOS: linux
      GOARCH: mips64
    commands:
      - go build -mod vendor -o /root/bin/gobac-linux-mips64 cmd/gobac/main.go

  - name: linux-mips64le
    image: golang:1.12-alpine
    depends_on:
      - restore-cache
    volumes:
      - name: shared_cache
        path: /root/.cache
      - name: bin
        path: /root/bin
    environment:
      GOOS: linux
      GOARCH: mips64le
    commands:
      - go build -mod vendor -o /root/bin/gobac-linux-mips64le cmd/gobac/main.go

  - name: windows-amd64
    image: golang:1.12-alpine
    depends_on:
      - restore-cache
    volumes:
      - name: bin
        path: /root/bin
      - name: shared_cache
        path: /root/.cache
    environment:
      GOOS: windows
      GOARCH: amd64
    commands:
      - go build -mod vendor -o /root/bin/gobac-windows-amd64 cmd/gobac/main.go

  - name: darwin-amd64
    image: golang:1.12-alpine
    depends_on:
      - restore-cache
    volumes:
      - name: bin
        path: /root/bin
      - name: shared_cache
        path: /root/.cache
    environment:
      GOOS: darwin
      GOARCH: amd64
    commands:
      - go build -mod vendor -o /root/bin/gobac-darwin-amd64 cmd/gobac/main.go

  - name: rebuild-cache
    image: drillster/drone-volume-cache
    depends_on:
      - linux-amd64
      - linux-arm64
      - linux-arm
      - linux-mips
      - linux-mipsle
      - linux-mips64
      - linux-mips64le
      - windows-amd64
      - darwin-amd64
    volumes:
      - name: shared_cache
        path: /cache-dir
      - name: gobac_binary_build_cache
        path: /cache
    settings:
      rebuild: true
      mount:
        - cache-dir

  - name: release
    depends_on:
      - linux-amd64
      - linux-arm64
      - linux-arm
      - linux-mips
      - linux-mipsle
      - linux-mips64
      - linux-mips64le
      - windows-amd64
      - darwin-amd64
    image: plugins/github-release
    volumes:
      - name: bin
        path: /tmp/bin
    settings:
      api_key:
        from_secret: github_secret
      files:
        - /tmp/bin/*
      checksum:
        - md5
        - sha1
        - sha256
        - sha512
    when:
      event: tag
---
kind: pipeline
name: after
depends_on:
  - build-docker
  - build-binaries
clone:
  disable: true
steps:
  - name: notify
    image: plugins/slack
    settings:
      webhook:
        from_secret: slack_webhook
      channel: test-zone
      username: drone
    when:
      status: [ success, failure ]
---
